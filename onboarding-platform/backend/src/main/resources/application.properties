# ═══════════════════════════════════════════════════════════
#  NexaWorks Onboarding Platform – application.properties
# ═══════════════════════════════════════════════════════════

server.port=8082

spring.application.name=nexaworks-onboarding

# ── DATABASE (H2 in-memory for zero-install demo) ──────────
spring.datasource.url=jdbc:h2:mem:nexaworksdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=nexaadmin
spring.datasource.password=nexa@2024
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── For PRODUCTION PostgreSQL – uncomment these ────────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/nexaworks
# spring.datasource.username=postgres
# spring.datasource.password=YOUR_PG_PASSWORD
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ── SERVER ─────────────────────────────────────────────────
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ── JWT ────────────────────────────────────────────────────
app.jwt.secret=NexaWorks2024SuperSecretKey!ForJWTSigning@Production#256BitKeyLength
app.jwt.expiration-ms=86400000

# ── CORS ───────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173

# ── AI MICROSERVICE ────────────────────────────────────────
ai.service.base-url=http://localhost:5001

# ── FILE UPLOAD ────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=./uploads

# ── EMAIL via Gmail SMTP ────────────────────────────────────
# IMPORTANT: Use Gmail App Password (NOT your main Gmail password)
# Steps: Google Account → Security → 2-Step Verification → App Passwords → Generate
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=24io10am9@mitsgwl.ac.in
spring.mail.password=#Amit$951@
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Alert recipient emails
app.alert.emails=sharma964aman@gmail.com,vishwakarmaankita754@gmail.com,jrashi813@gmail.com

# ── ACTUATOR ───────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── LOGGING ────────────────────────────────────────────────
logging.level.com.nexaworks=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.mail=DEBUG
